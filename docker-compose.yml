services:
    api:
        build:
            context: .
            dockerfile: Dockerfile.api
        ports:
            - "3434:3434"
        env_file: apps/api/.env
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3434/healthcheck"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s

    tunnel:
        build:
            context: .
            dockerfile: Dockerfile.tunnel
        depends_on:
            - api
        volumes:
            - /home/brandon/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
        restart: always
