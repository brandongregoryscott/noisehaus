name: build

on:
    push:
        branches: ["*"]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  cache: "npm"
                  node-version: 24.13.1

            - name: npm ci
              run: npm ci

            - name: npm run build
              run: npm run build
